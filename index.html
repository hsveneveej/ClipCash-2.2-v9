<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0a0f">
    <title>ClipCash - Ganhe Dinheiro Assistindo Vídeos</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- ============================================ -->
    <!-- FIREBASE SDK -->
    <!-- ============================================ -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-analytics-compat.js"></script>
    
    <style>
        :root {
            --bg: #0a0a0f; --bg2: #12121a; --bg3: #1a1a25; --bg4: #1e1e2e;
            --gold: #ffd700; --green: #10b981; --red: #ef4444; --purple: #8b5cf6;
            --text: #e2e8f0; --text2: #94a3b8; --border: #1e293b; --card: #1a1a28; --radius: 16px;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Poppins',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; -webkit-tap-highlight-color:transparent; user-select:none; overflow-x:hidden; line-height:1.5; }
        ::-webkit-scrollbar { width:3px; } ::-webkit-scrollbar-track { background:var(--bg); } ::-webkit-scrollbar-thumb { background:var(--gold); border-radius:3px; }

        /* ========== INDICADOR DE CONEXÃO ========== */
        .cloud-status {
            display:inline-flex; align-items:center; gap:4px;
            font-size:9px; padding:3px 8px; border-radius:10px; font-weight:600;
            position:absolute; top:8px; left:8px; z-index:10;
        }
        .cloud-status.online { background:rgba(16,185,129,0.2); color:#10b981; border:1px solid rgba(16,185,129,0.3); }
        .cloud-status.offline { background:rgba(239,68,68,0.2); color:#ef4444; border:1px solid rgba(239,68,68,0.3); }
        .cloud-status.syncing { background:rgba(245,158,11,0.2); color:#f59e0b; border:1px solid rgba(245,158,11,0.3); }

        .splash { position:fixed; inset:0; background:radial-gradient(ellipse at center,#1a1a35,#0a0a0f); display:flex; align-items:center; justify-content:center; z-index:99999; flex-direction:column; transition:opacity 0.5s ease; }
        .splash.hidden { opacity:0; pointer-events:none; }
        .splash-logo { font-size:80px; animation:floatSplash 3s ease-in-out infinite; filter:drop-shadow(0 0 40px rgba(255,215,0,0.6)); }
        @keyframes floatSplash { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-18px)} }
        .splash-title { font-size:44px; font-weight:900; background:linear-gradient(135deg,#ffd700,#ffaa00,#ffd700); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; margin-top:14px; }
        .splash-progress { width:180px; height:3px; background:rgba(255,255,255,0.1); border-radius:3px; margin-top:20px; overflow:hidden; }
        .splash-progress-fill { height:100%; background:var(--gold); border-radius:3px; animation:progressAnim 2.5s ease forwards; }
        @keyframes progressAnim { from{width:0%} to{width:100%} }

        .login-container { width:100%; max-width:420px; background:#0f172a; border-radius:24px; overflow:hidden; box-shadow:0 0 40px rgba(0,0,0,0.5); border:1px solid rgba(255,255,255,0.05); margin:16px auto; position:relative; }
        .video-area { position:relative; width:100%; background:black; }
        .video-area video { width:100%; height:200px; object-fit:cover; }
        .optional { position:absolute; top:10px; right:10px; background:rgba(0,0,0,0.6); padding:5px 12px; border-radius:20px; font-size:11px; color:white; }
        .login-content { padding:20px; }
        .logo-login { text-align:center; margin-bottom:16px; }
        .logo-login h1 { font-size:30px; font-weight:700; color:#22c55e; }
        .logo-login span { color:white; }
        .language-box { margin-bottom:12px; }
        .language-box select { width:100%; padding:12px; border:none; outline:none; border-radius:12px; background:#1e293b; color:white; font-size:13px; font-family:'Poppins',sans-serif; cursor:pointer; }
        .input-group { margin-bottom:10px; }
        .input-group input { width:100%; padding:12px; border:none; outline:none; border-radius:12px; background:#1e293b; color:white; font-size:13px; font-family:'Poppins',sans-serif; }
        .login-btn { width:100%; padding:13px; border:none; border-radius:12px; font-size:14px; font-weight:600; cursor:pointer; font-family:'Poppins',sans-serif; margin-bottom:8px; color:white; }
        .login-btn.primary { background:#22c55e; } .login-btn.guest { background:#334155; }
        .toggle-buttons { display:flex; gap:6px; margin-bottom:12px; }
        .toggle-btn { flex:1; padding:9px; background:#1e293b; border:1px solid #334155; border-radius:20px; color:#94a3b8; font-size:11px; font-weight:600; cursor:pointer; text-align:center; font-family:'Poppins',sans-serif; }
        .toggle-btn.active { background:#22c55e; color:white; border-color:#22c55e; }
        .error-msg { background:rgba(239,68,68,0.15); border:1px solid #ef4444; color:#ff6b6b; padding:9px; border-radius:10px; margin-bottom:10px; font-size:11px; text-align:center; display:none; }
        .bonus-banner { background:linear-gradient(135deg,#1a1a35,#2d1b4e); border:2px solid #ffd700; border-radius:12px; padding:10px; margin-bottom:12px; text-align:center; font-size:11px; }
        .bonus-banner .bonus-amount { color:#ffd700; font-size:18px; font-weight:900; }
        .login-screen-wrapper { display:none; min-height:100vh; background:#050816; padding:14px; align-items:center; justify-content:center; }
        .login-screen-wrapper.active { display:flex; }
        .links { display:flex; justify-content:space-between; margin-top:12px; font-size:11px; }
        .links a { color:#60a5fa; text-decoration:none; }
        .footer-login { text-align:center; margin-top:14px; color:#64748b; font-size:10px; }

        .screen { display:none; position:fixed; inset:0; background:var(--bg); overflow-y:auto; overflow-x:hidden; }
        .screen.active { display:flex; flex-direction:column; }
        .app-header { background:var(--bg2); border-bottom:1px solid var(--border); padding:8px 12px; position:sticky; top:0; z-index:100; }
        .header-row { display:flex; align-items:center; gap:8px; }
        .user-avatar { width:34px; height:34px; border-radius:50%; border:2px solid #ffd700; display:flex; align-items:center; justify-content:center; font-size:16px; background:var(--bg3); flex-shrink:0; cursor:pointer; position:relative; }
        .header-balance { flex:1; background:var(--bg3); border-radius:8px; padding:5px 8px; border:1px solid var(--border); }
        .header-balance .bal-val { font-weight:700; font-size:11px; color:#ffd700; }
        .header-balance .bal-lbl { font-size:7px; color:var(--text2); }
        .main-content { flex:1; overflow-y:auto; padding:8px; padding-bottom:75px; }
        .page { display:none; } .page.active { display:block; animation:fadeIn 0.3s ease; }
        @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
        .card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:14px; margin-bottom:10px; }
        .card-gold { background:linear-gradient(135deg,#f59e0b,#d97706); color:#000; border:none; }
        .card-title { font-weight:700; font-size:14px; margin-bottom:8px; }
        .progress-bar { height:8px; background:rgba(255,255,255,0.1); border-radius:4px; overflow:hidden; }
        .progress-fill { height:100%; background:linear-gradient(90deg,#8b5cf6,#ffd700); border-radius:4px; transition:width 0.5s; }
        .bottom-nav { position:fixed; bottom:0; left:0; right:0; background:var(--bg2); border-top:1px solid var(--border); display:flex; justify-content:space-around; padding:8px 0 10px; z-index:100; }
        .nav-item { display:flex; flex-direction:column; align-items:center; gap:3px; background:none; border:none; color:var(--text2); cursor:pointer; font-size:9px; padding:4px 8px; border-radius:8px; }
        .nav-item.active { color:#ffd700; background:rgba(255,215,0,0.08); } .nav-item .nav-ico { font-size:18px; }
        .btn { padding:12px 20px; border-radius:12px; font-weight:600; cursor:pointer; border:none; width:100%; font-family:'Poppins',sans-serif; font-size:13px; }
        .btn:active { transform:scale(0.97); } .btn-gold { background:linear-gradient(135deg,#ffd700,#ff8c00); color:#000; }
        .btn-sm { padding:6px 14px; background:#ffd700; border:none; border-radius:16px; color:#000; font-weight:700; font-size:10px; cursor:pointer; }
        .badge { display:inline-block; padding:3px 10px; border-radius:12px; font-size:9px; font-weight:700; }
        .badge-purple { background:rgba(168,85,247,0.2); color:#a855f7; border:1px solid rgba(168,85,247,0.3); }
        .input-field { width:100%; padding:10px; background:var(--bg3); border:1px solid var(--border); border-radius:8px; color:#fff; font-size:12px; margin-bottom:8px; outline:none; font-family:'Poppins',sans-serif; }
        .input-field:focus { border-color:#ffd700; }
        .popup-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.9); display:flex; align-items:center; justify-content:center; z-index:999; }
        .popup-overlay.hidden { display:none; }
        .popup-box { background:var(--card); border:2px solid #ffd700; border-radius:18px; padding:22px; text-align:center; max-width:400px; width:92%; max-height:80vh; overflow-y:auto; }
        .popup-emoji { font-size:50px; } .popup-amount { font-size:30px; font-weight:900; color:#ffd700; margin:8px 0; }
        .popup-btn { padding:10px 22px; background:#ffd700; border:none; border-radius:14px; font-weight:700; font-size:12px; cursor:pointer; margin:4px; }

        .yt-container { width:100%; height:200px; background:#000; border-radius:12px; overflow:hidden; position:relative; margin-bottom:10px; }
        .yt-container iframe { width:100%; height:100%; border:none; }
        .yt-overlay { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; background:rgba(0,0,0,0.55); z-index:2; flex-direction:column; gap:6px; pointer-events:none; }
        .yt-overlay.hidden { opacity:0; }
        .yt-play-hint { background:rgba(255,0,0,0.9); padding:10px 20px; border-radius:20px; font-size:13px; color:#fff; font-weight:700; animation:pulseHint 2s infinite; }
        @keyframes pulseHint { 0%,100%{opacity:1} 50%{opacity:0.7} }
        .timer-display { font-size:44px; font-weight:900; color:#ffd700; letter-spacing:3px; text-align:center; margin:8px 0; }
        .timer-bar { width:100%; height:5px; background:rgba(255,255,255,0.15); border-radius:3px; overflow:hidden; margin:8px 0; }
        .timer-bar-fill { height:100%; background:#10b981; border-radius:3px; transition:width 1s linear; }
        .status-text { font-size:13px; font-weight:600; text-align:center; min-height:20px; }

        .withdraw-methods { display:grid; grid-template-columns:repeat(3,1fr); gap:6px; margin-bottom:10px; max-height:300px; overflow-y:auto; }
        .wd-method { padding:10px 6px; background:var(--bg3); border:2px solid var(--border); border-radius:10px; text-align:center; cursor:pointer; font-size:9px; font-weight:600; }
        .wd-method:hover { border-color:var(--gold); } .wd-method.selected { border-color:#ffd700; background:rgba(255,215,0,0.12); }

        .payout-box { background:var(--card); border:2px solid var(--green); border-radius:14px; padding:10px; margin-bottom:10px; max-height:180px; overflow:hidden; }
        .payout-box-title { font-size:11px; color:var(--green); font-weight:700; margin-bottom:6px; display:flex; align-items:center; gap:6px; }
        .live-dot { width:7px; height:7px; background:var(--green); border-radius:50%; animation:pulse 1s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
        .payout-item { display:flex; justify-content:space-between; padding:6px 8px; font-size:10px; border-bottom:1px solid rgba(255,255,255,0.03); }

        .affiliate-row { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:10px; }
        .affiliate-card { border-radius:12px; padding:12px; text-align:center; cursor:pointer; }
        .affiliate-card:active { transform:scale(0.96); }
        .affiliate-card.placard { background:linear-gradient(135deg,#1a1a35,#1e3a5f); border:2px solid #3b82f6; }
        .affiliate-card.olabet { background:linear-gradient(135deg,#2d1b4e,#1a1a35); border:2px solid #ec4899; }
        .affiliate-icon { font-size:28px; margin-bottom:4px; }
        .affiliate-title { font-weight:700; font-size:11px; } .affiliate-subtitle { font-size:9px; opacity:0.8; }

        .video-card-3d { background:linear-gradient(145deg,#1a1a30,#151525); border:2px solid var(--border); border-radius:16px; padding:14px; margin-bottom:10px; cursor:pointer; transition:all 0.4s; animation:floatCard 3s ease-in-out infinite; }
        .video-card-3d:nth-child(odd) { animation-delay:0s; } .video-card-3d:nth-child(even) { animation-delay:1.5s; }
        .video-card-3d:hover { transform:translateY(-8px) scale(1.03); border-color:var(--gold); box-shadow:0 20px 40px rgba(255,215,0,0.2); }
        @keyframes floatCard { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
        .video-card-3d .vc-inner { display:flex; gap:12px; align-items:center; }
        .video-card-3d .vc-icon { width:48px; height:48px; background:#000; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:24px; border:2px solid rgba(255,215,0,0.3); }
        .video-card-3d .vc-info { flex:1; } .video-card-3d .vc-title { font-weight:700; font-size:14px; }
        .video-card-3d .vc-anunciante { font-size:10px; color:var(--text2); }
        .video-card-3d .vc-reward { font-size:11px; color:var(--gold); font-weight:600; }
        .video-card-3d .vc-play-btn { background:red; width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:#fff; font-size:14px; }

        .invite-box { background:linear-gradient(135deg,#1e3a5f,#2d1b4e); border:2px solid #ffd700; border-radius:14px; padding:14px; text-align:center; margin-bottom:10px; }
        .invite-link-display { background:#000; color:#0f0; font-family:monospace; font-size:12px; padding:10px; border-radius:8px; word-break:break-all; margin:8px 0; }

        .admin-tabs { display:flex; gap:5px; flex-wrap:wrap; margin-bottom:12px; }
        .admin-tab { padding:8px 14px; background:var(--bg3); border:1px solid var(--border); border-radius:16px; cursor:pointer; font-size:10px; font-weight:600; }
        .admin-tab.active { background:var(--gold); color:#000; }
        .admin-user-counter { background:linear-gradient(135deg,#1a1a35,#2d1b4e); border:2px solid var(--gold); border-radius:14px; padding:12px; text-align:center; margin-bottom:12px; }
        .admin-user-counter .count { font-size:32px; font-weight:900; color:var(--gold); }
    </style>
</head>
<body>

    <div id="splash" class="splash">
        <div class="splash-logo">💎</div>
        <div class="splash-title">ClipCash</div>
        <div class="splash-progress"><div class="splash-progress-fill"></div></div>
    </div>

    <div id="loginScreen" class="login-screen-wrapper active">
        <div class="login-container">
            <span class="cloud-status syncing" id="cloudStatusLogin">☁️ Conectando...</span>
            <div class="video-area">
                <video id="tutorialVideo" controls autoplay muted loop playsinline>
                    <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
                </video>
                <div class="optional">📚 Tutorial</div>
            </div>
            <div class="login-content">
                <div class="logo-login"><h1>Clip<span>Cash</span></h1><p>Ganhe Dinheiro Assistindo Vídeos</p></div>
                <div class="bonus-banner">🎁 <b>Bônus:</b> <span class="bonus-amount" id="bonusDisplay">50 MT</span><br><small>+15 MT para quem te convidou!</small></div>
                <div class="toggle-buttons">
                    <button class="toggle-btn active" onclick="showLoginSection()">🔐 Login</button>
                    <button class="toggle-btn" onclick="showRegisterSection()">📝 Registrar</button>
                </div>
                <div class="language-box">
                    <select id="languageSelect" onchange="atualizarPais()">
                        <option value="MZ">🇲🇿 Moçambique</option><option value="BR">🇧🇷 Brasil</option>
                        <option value="PT">🇵🇹 Portugal</option><option value="AO">🇦🇴 Angola</option>
                    </select>
                </div>
                <div id="loginErrorMsg" class="error-msg"></div>
                <div id="loginSection">
                    <div class="input-group"><input type="email" id="loginEmail" placeholder="Email"></div>

                    <div class="input-group"><input type="email" id="regEmail" placeholder="Email"></div>
                    <div class="input-group"><input type="password" id="regSenha" placeholder="Senha (mín.6)"></div>
                    <div class="input-group"><input type="password" id="regSenhaC" placeholder="Confirmar"></div>
                    <button class="login-btn primary" onclick="executarCadastro()">📝 Criar Conta</button>
                </div>
                <div class="links"><a href="#" onclick="alert('Contate suporte')">Esqueceu senha?</a><a href="#" onclick="showRegisterSection()">Criar Conta</a></div>
                <div class="footer-login">© 2026 ClipCash</div>
            </div>
        </div>
    </div>

    <div id="mainApp" class="screen hidden">
        <header class="app-header">
            <div class="header-row">
                <span class="cloud-status syncing" id="cloudStatusMain" style="position:static;">☁️</span>
                <div class="user-avatar" id="adminTrigger"><span id="hdrAvatar">👤</span></div>

        <main class="main-content">
            <div id="page-home" class="page active"></div>
            <div id="page-videos" class="page"></div>
            <div id="page-wallet" class="page"></div>
            <div id="page-invite" class="page"></div>

        <nav class="bottom-nav">
            <button class="nav-item active" onclick="navegar('home')"><span class="nav-ico">🏠</span>Início</button>
            <button class="nav-item" onclick="navegar('videos')"><span class="nav-ico">🎬</span>Vídeos</button>
            <button class="nav-item" onclick="navegar('wallet')"><span class="nav-ico">💰</span>Saque</button>

            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">

                <button class="btn-sm" style="background:#ef4444;color:#fff;" onclick="fecharAdmin()">❌ Sair</button>

            <div class="admin-tabs">
                <button class="admin-tab active" onclick="adminTab('saques')">💳 Saques</button>

                <div class="yt-overlay" id="ytOverlay"><div class="yt-play-hint">▶️ Clique no PLAY do YouTube</div></div>

            <p class="status-text" id="ytStatus">⏳ Aguardando play...</p>
            <button class="btn-sm" onclick="sairYT()" style="background:#ef4444;color:#fff;width:100%;margin-top:8px;">⏹️ Sair</button>
        </div>

    <div id="rewardPopup" class="popup-overlay hidden">
        <div class="popup-box"><div class="popup-emoji">💰</div><div class="popup-amount" id="popupAmount">+0</div><p id="popupMsg"></p><button class="popup-btn" onclick="document.getElementById('rewardPopup').classList.add('hidden')">OK</button></div>

        <div class="popup-box"><div class="popup-emoji">🔐</div><h3>Senha Admin</h3><input type="password" class="input-field" id="adminPassInput"><button class="popup-btn" onclick="loginAdmin()">Entrar</button></div>
    </div>

    const CloudDB = {
        ref(path) { return fbDB.ref(path); },
        
        async salvar(path, data) {
            try { await this.ref(path).set(data); return true; } 
            catch(e) { console.error('Erro ao salvar:', e); return false; }
        },
        
        async atualizar(path, data) {
            try { await this.ref(path).update(data); return true; } 
            catch(e) { console.error('Erro ao atualizar:', e); return false; }
        },
        
        async buscar(path) {
            try { const snap = await this.ref(path).once('value'); return snap.val(); } 
            catch(e) { console.error('Erro ao buscar:', e); return null; }
        },
        
        async push(path, data) {
            try { const newRef = this.ref(path).push(); await newRef.set(data); return newRef.key; } 
            catch(e) { console.error('Erro ao push:', e); return null; }
        },
        
        async remover(path) {
            try { await this.ref(path).remove(); return true; } 
            catch(e) { return false; }
        },

        // Usuários
        async salvarUsuario(usuario) {
            await this.salvar('usuarios/' + usuario.id, usuario);

        },
        
        async buscarPorEmail(email) {
            const entry = await this.buscar('emails/' + btoa(email));
            if (entry && entry.uid) return await this.buscar('usuarios/' + entry.uid);
            return null;
        },
        
        async buscarPorId(id) { return await this.buscar('usuarios/' + id); },
        
        async buscarPorCodigo(codigo) {
            const entry = await this.buscar('convites/' + codigo);
            if (entry && entry.uid) return await this.buscarPorId(entry.uid);
            return null;
        },
        
        async todosUsuarios() {
            const snap = await this.ref('usuarios').once('value');
            const data = snap.val();
            return data ? Object.values(data) : [];
        },
        
        // Saques
        async addSaque(uid, saque) {
            saque.id = 'sq' + Date.now();
            saque.dt = new Date().toISOString();
            saque.st = 'pendente';
            return await this.push('saques/' + uid, saque);
        },
        
        async todosSaques() {
            const snap = await this.ref('saques').once('value');
            const data = snap.val();
            if (!data) return [];
            let todos = [];
            Object.values(data).forEach(function(arr) {
                if (arr) Object.values(arr).forEach(function(s) { todos.push(s); });
            });
            return todos;
        },

    function selMetodo(m,el){metodoSaque=m;document.querySelectorAll('.wd-method').forEach(x=>x.classList.remove('selected'));el.classList.add('selected');document.getElementById('saqueDetalhe').innerHTML=`<input type="text" class="input-field" id="saqueDados" placeholder="Dados da conta ${m}">`;}
    async function solicitarSaque(){if(!metodoSaque)return alert('Selecione método!');const d=document.getElementById('saqueDados')?.value;if(!d)return alert('Preencha!');if(U.saldo<U.saque_minimo)return alert('Saldo insuficiente!');const taxa=(U.saldo*CFG.TAXA_SAQUE)/100;const vr=U.saldo-taxa;await CloudDB.addSaque(U.id,{uid:U.id,nome:U.nome,email:U.email,valor:U.saldo,taxa,vr,metodo:metodoSaque,dados:d,simbolo:P.simbolo});U.saldo=0;U.total_sacado+=vr;await CloudDB.salvarUsuario(U);ui();alert('✅ Saque solicitado!');navegar('home');}

    function inviteHTML(){if(!U)return'';const link=window.location.origin+window.location.pathname+'?ref='+U.codigo_convite;const convidados=U.convidados||[];const tg=convidados.reduce((a,c)=>a+(c.bonus||0),0);return`<div class="invite-box"><h3>🔗 Convide e Ganhe!</h3><p>Você: <b style="color:#ffd700;">+${P.simbolo}${CFG.BONUS_CONVIDANTE.toFixed(2)}</b> | Amigo: <b style="color:#10b981;">+${P.simbolo}${CFG.BONUS_CONVIDADO.toFixed(2)}</b></p><div class="invite-link-display">${link}</div><button class="btn btn-gold" onclick="copiarLink('${link}')">📋 Copiar</button></div><div class="card"><div class="card-title">📊 Indicações (${convidados.length})</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;"><div style="background:var(--bg3);padding:10px;border-radius:10px;text-align:center;"><div style="font-size:24px;font-weight:700;color:#ffd700;">${convidados.length}</div></div><div style="background:var(--bg3);padding:10px;border-radius:10px;text-align:center;"><div style="font-size:24px;font-weight:700;color:#10b981;">${fm(tg)}</div></div></div></div>`;}
    function copiarLink(link){navigator.clipboard.writeText(link).then(()=>alert('✅ Copiado!')).catch(()=>{const ta=document.createElement('textarea');ta.value=link;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);alert('✅ Copiado!');});}

    // ============================================
    // ADMIN
    // ============================================
    document.getElementById('adminTrigger')?.addEventListener('click',function(){if(!U||U.tipo!=='admin')return;adminClicks++;if(adminTimer)clearTimeout(adminTimer);if(adminClicks>=15){adminClicks=0;document.getElementById('adminPassPopup').classList.remove('hidden');}adminTimer=setTimeout(function(){adminClicks=0;},3000);});
    function loginAdmin(){if(document.getElementById('adminPassInput').value===adminSenha){document.getElementById('adminPassPopup').classList.add('hidden');abrirAdmin();}else alert('Senha incorreta!');}
    async function abrirAdmin(){document.getElementById('mainApp').classList.add('hidden');document.getElementById('adminScreen').classList.remove('hidden');document.getElementById('adminScreen').classList.add('active');atualizarContadorAdmin();adminTab('saques');}
    function fecharAdmin(){document.getElementById('adminScreen').classList.add('hidden');document.getElementById('mainApp').classList.remove('hidden');document.getElementById('mainApp').classList.add('active');navegar('home');}
    
    async function adminTab(tab){
        document.querySelectorAll('.admin-tab').forEach(t=>t.classList.remove('active'));
        const tabs=document.querySelectorAll('.admin-tab');const idx={saques:0,usuarios:1,videos:2,afiliados:3,config:4};
        if(tabs[idx[tab]])tabs[idx[tab]].classList.add('active');
        const c=document.getElementById('adminContent');atualizarContadorAdmin();
        if(tab==='saques'){const ss=(await CloudDB.todosSaques()).filter(s=>s.st==='pendente');c.innerHTML=ss.length===0?'<p>Nenhum saque.</p>':ss.map(s=>`<div class="card"><p><b>${s.nome}</b></p><p>💰 ${s.simbolo} ${(s.valor||0).toFixed(2)} → ${(s.vr||0).toFixed(2)}</p><div style="display:flex;gap:6px;"><button class="btn-sm" style="background:#10b981;" onclick="admAprSaque('${s.id}','${s.uid}')">✅</button><button class="btn-sm" style="background:#ef4444;" onclick="admRejSaque('${s.id}','${s.uid}')">❌</button></div></div>`).join('');}
        if(tab==='usuarios'){const us=await CloudDB.todosUsuarios();c.innerHTML=us.map(u=>`<div class="card"><p><b>${u.nome}</b> (${u.email})</p><p>💰 ${fm(u.saldo)}</p><button class="btn-sm" style="background:${u.bloqueado?'#10b981':'#ef4444'};" onclick="admToggle('${u.id}')">${u.bloqueado?'🔓':'🔒'}</button></div>`).join('');}
        if(tab==='videos'){c.innerHTML='<h4 style="color:#ffd700;">🎬 10 Vídeos</h4><p style="color:var(--text2);">Configure no Console Firebase → Database → videos</p>';}
        if(tab==='afiliados'){c.innerHTML=`<div class="card"><h4 style="color:#ffd700;">🔗 Afiliados</h4><input type="url" class="input-field" id="cfgPlacard" value="${linksAfiliados.placard}" placeholder="Link Placard"><input type="text" class="input-field" id="cfgPlacardTxt" value="${linksAfiliados.placardTxt}" placeholder="Texto"><input type="text" class="input-field" id="cfgPlacardSub" value="${linksAfiliados.placardSub}" placeholder="Subtexto"><input type="url" class="input-field" id="cfgOlaBet" value="${linksAfiliados.olabet}" placeholder="Link OlaBet"><input type="text" class="input-field" id="cfgOlaBetTxt" value="${linksAfiliados.olabetTxt}" placeholder="Texto"><input type="text" class="input-field" id="cfgOlaBetSub" value="${linksAfiliados.olabetSub}" placeholder="Subtexto"><button class="btn btn-gold" onclick="admSalvarAfiliados()">💾 Salvar</button></div>`;}
        if(tab==='config'){c.innerHTML=`<div class="card"><h4 style="color:#ffd700;">⚙️ Config</h4><label style="font-size:10px;">Nova Senha Admin</label><input type="password" class="input-field" id="cfgSenha" placeholder="Manter"><button class="btn btn-gold" onclick="admSalvarConfig()">💾 Salvar</button></div>`;}
    }
    
    async function admAprSaque(sid,uid){
        const ref = CloudDB.ref('saques/' + uid);
        const snap = await ref.once('value');
        const data = snap.val();
        if(data){
            Object.keys(data).forEach(function(k){
                if(data[k].id===sid){data[k].st='concluido';data[k].proc=new Date().toISOString();}
            });
            await ref.set(data);
        }
        adminTab('saques');
    }
    
    async function admRejSaque(sid,uid){
        const ref = CloudDB.ref('saques/' + uid);
        const snap = await ref.once('value');
        const data = snap.val();
        if(data){
            Object.keys(data).forEach(async function(k){
                if(data[k].id===sid){
                    data[k].st='rejeitado';
                    const u=await CloudDB.buscarPorId(uid);
                    if(u){u.saldo+=(data[k].valor||0);await CloudDB.salvarUsuario(u);}
                }
            });
            await ref.set(data);
        }
        adminTab('saques');
    }
    
    async function admToggle(uid){const u=await CloudDB.buscarPorId(uid);if(u){u.bloqueado=!u.bloqueado;await CloudDB.salvarUsuario(u);adminTab('usuarios');}}
    
    async function admSalvarAfiliados(){
        linksAfiliados.placard=document.getElementById('cfgPlacard')?.value||'';
        linksAfiliados.olabet=document.getElementById('cfgOlaBet')?.value||'';
        linksAfiliados.placardTxt=document.getElementById('cfgPlacardTxt')?.value||'';
        linksAfiliados.placardSub=document.getElementById('cfgPlacardSub')?.value||'';
        linksAfiliados.olabetTxt=document.getElementById('cfgOlaBetTxt')?.value||'';
        linksAfiliados.olabetSub=document.getElementById('cfgOlaBetSub')?.value||'';
        await CloudDB.salvarConfig();
        alert('✅ Salvo!');
    }
    
    async function admSalvarConfig(){
        const ns=document.getElementById('cfgSenha')?.value;
        if(ns&&ns.length>=4){adminSenha=ns;}
        await CloudDB.salvarConfig();
        alert('✅ Salvo!');
    }

    async function init(){
        await CloudDB.carregarConfig();
        atualizarPais();
        setTimeout(function(){document.getElementById('splash').classList.add('hidden');},2500);
        setInterval(function(){fakeUserCount+=Math.floor(Math.random()*3);atualizarContadorAdmin();},30000);
        setInterval(function(){if(U){resetCheck();ui();}},30000);
    }
    
    document.addEventListener('DOMContentLoaded',init);
    console.log('🚀 CLIPCASH v17 - Firebase Cloud ☁️');
    console.log('✅ Dados salvos na nuvem (Firebase Realtime Database)');
    console.log('✅ Sem localStorage - tudo online!');
    </script>
</body>
