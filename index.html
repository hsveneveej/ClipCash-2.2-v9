        .screen { display:none; position:fixed; inset:0; background:var(--bg); overflow-y:auto; overflow-x:hidden; }
        .screen.active { display:flex; flex-direction:column; }
        .app-header { background:var(--bg2); border-bottom:1px solid var(--border); padding:8px 12px; position:sticky; top:0; z-index:100; }

        .card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:14px; margin-bottom:10px; }

        .card-title { font-weight:700; font-size:14px; margin-bottom:8px; }
        .progress-bar { height:8px; background:rgba(255,255,255,0.1); border-radius:4px; overflow:hidden; }

        .popup-btn { padding:10px 22px; background:#ffd700; border:none; border-radius:14px; font-weight:700; font-size:12px; cursor:pointer; margin:4px; }

        async push(p,d){try{const n=this.ref(p).push();await n.set(d);return n.key;}catch(e){return null;}},
        async salvarUsuario(u){if(u.isGuest)return;try{await this.ref('usuarios/'+u.id).set(u);await this.ref('emails/'+u.email.toLowerCase().replace(/\./g,'_')).set({uid:u.id,email:u.email});}catch(e){}},

        async buscarPorCodigo(c){const e=await this.buscar('convites/'+c);return(e&&e.uid)?await this.buscarPorId(e.uid):null;},
        async todosUsuarios(){const s=await this.ref('usuarios').once('value');const d=s.val();return d?Object.values(d):[];},

    function abrirYT(vid){if(!U)U=criarConvidado();resetCheck();if(U.videos_hoje>=CFG.VIDEOS_DIA)return alert('Limite diário!');const vs=videosAtivos();const v=vs.find(x=>x.id===vid);if(!v)return;ytVid=v;ytSeg=CFG.DURACAO_VIDEO;ytAtivo=false;document.getElementById('ytPlayer').innerHTML='<iframe id="ytIframe" src="https://www.youtube.com/embed/'+(v.yt||'dQw4w9WgXcQ')+'?autoplay=0&controls=1&rel=0&enablejsapi=1" style="width:100%;height:100%;border:none;border-radius:10px;" allow="autoplay;encrypted-media" allowfullscreen></iframe>';document.getElementById('ytOverlay').classList.remove('hidden');document.getElementById('ytTitulo').textContent=v.t;document.getElementById('ytAnunciante').textContent=v.a;document.getElementById('ytGanho').textContent='Ganho: '+fm(P.ganho_vid*U.multiplicador);document.getElementById('ytStatus').textContent='⏳ Aguardando play...';document.getElementById('ytStatus').style.color='#f59e0b';document.getElementById('ytTimer').textContent='05:00';document.getElementById('ytBar').style.width='0%';document.getElementById('ytPopup').classList.remove('hidden');var msgHandler=function(e){if(e.data&&typeof e.data==='string'){try{var d=JSON.parse(e.data);if(d.event==='onStateChange'&&d.info===1&&!ytAtivo){window.removeEventListener('message',msgHandler);ytAtivo=true;document.getElementById('ytOverlay').classList.add('hidden');document.getElementById('ytStatus').textContent='▶️ Rodando!';document.getElementById('ytStatus').style.color='#10b981';startYTTimer();}}catch(er){}}};window.addEventListener('message',msgHandler);setTimeout(function(){if(!ytAtivo){window.removeEventListener('message',msgHandler);ytAtivo=true;document.getElementById('ytOverlay').classList.add('hidden');document.getElementById('ytStatus').textContent='▶️ Rodando!';document.getElementById('ytStatus').style.color='#10b981';startYTTimer();}},30000);}

        const c=document.getElementById('adminContent');
        if(tab==='saques'){const ss=(await CloudDB.todosSaques()).filter(s=>s.st==='pendente');c.innerHTML=ss.length===0?'<p>Nenhum saque.</p>':ss.map(s=>`<div class="card"><p><b>${s.nome}</b></p><p>💰 ${s.simbolo} ${(s.valor||0).toFixed(2)} → ${(s.vr||0).toFixed(2)}</p><div style="display:flex;gap:6px;"><button class="btn-sm" style="background:#10b981;" onclick="admAprSaque('${s.id}','${s.uid}')">✅</button><button class="btn-sm" style="background:#ef4444;" onclick="admRejSaque('${s.id}','${s.uid}')">❌</button></div></div>`).join('');}
        if(tab==='usuarios'){const us=await CloudDB.todosUsuarios();c.innerHTML=us.map(u=>`<div class="card"><p><b>${u.nome}</b></p><p>💰 ${fm(u.saldo)}</p><button class="btn-sm" style="background:${u.bloqueado?'#10b981':'#ef4444'};" onclick="admToggle('${u.id}')">${u.bloqueado?'🔓':'🔒'}</button></div>`).join('');}
        if(tab==='videos'){let h='<h4 style="color:#ffd700;">🎬 10 Vídeos YouTube</h4>';for(let i=0;i<10;i++){const v=VIDEOS_YT[i]||{id:'v'+(i+1),t:'',a:'',yt:'',ic:'🎬',ativo:true};h+=`<div class="video-admin-item"><b>#${i+1}</b><input id="vt${i}" value="${v.t||''}" placeholder="Título"><input id="va${i}" value="${v.a||''}" placeholder="Anunciante"><input id="vyt${i}" value="${v.yt||''}" placeholder="ID YouTube"><label><input type="checkbox" id="vac${i}" ${v.ativo!==false?'checked':''}> Ativo</label></div>`;}h+='<button class="btn btn-gold" onclick="admSalvarVideos()">💾 Salvar</button>';c.innerHTML=h;}
        if(tab==='afiliados'){c.innerHTML=`<div class="card"><h4 style="color:#ffd700;">🔗 Afiliados</h4><input type="url" class="input-field" id="cfgPlacard" value="${linksAfiliados.placard}"><input type="text" class="input-field" id="cfgPlacardTxt" value="${linksAfiliados.placardTxt}"><input type="text" class="input-field" id="cfgPlacardSub" value="${linksAfiliados.placardSub}"><input type="url" class="input-field" id="cfgOlaBet" value="${linksAfiliados.olabet}"><input type="text" class="input-field" id="cfgOlaBetTxt" value="${linksAfiliados.olabetTxt}"><input type="text" class="input-field" id="cfgOlaBetSub" value="${linksAfiliados.olabetSub}"><button class="btn btn-gold" onclick="admSalvarAfiliados()">💾 Salvar</button></div>`;}
        if(tab==='config'){c.innerHTML=`<div class="card"><h4 style="color:#ffd700;">⚙️ Config</h4><input type="password" class="input-field" id="cfgSenha" placeholder="Nova senha"><button class="btn btn-gold" onclick="admSalvarConfig()">💾 Salvar</button></div>`;}
    }
    function admSalvarVideos(){for(let i=0;i<10;i++){const t=document.getElementById('vt'+i)?.value?.trim();const a=document.getElementById('va'+i)?.value?.trim();const y=document.getElementById('vyt'+i)?.value?.trim();const ac=document.getElementById('vac'+i)?.checked!==false;if(y&&VIDEOS_YT[i]){VIDEOS_YT[i].t=t||VIDEOS_YT[i].t;VIDEOS_YT[i].a=a||VIDEOS_YT[i].a;VIDEOS_YT[i].yt=y;VIDEOS_YT[i].ativo=ac;}}alert('✅ Vídeos salvos!');adminTab('videos');}
    async function admAprSaque(sid,uid){const ref=CloudDB.ref('saques/'+uid);const snap=await ref.once('value');const data=snap.val();if(data){Object.keys(data).forEach(function(k){if(data[k].id===sid){data[k].st='concluido';}});await ref.set(data);}alert('✅ Aprovado!');adminTab('saques');}
    async function admRejSaque(sid,uid){const ref=CloudDB.ref('saques/'+uid);const snap=await ref.once('value');const data=snap.val();if(data){Object.keys(data).forEach(async function(k){if(data[k].id===sid){data[k].st='rejeitado';const u=await CloudDB.buscarPorId(uid);if(u){u.saldo+=(data[k].valor||0);await CloudDB.salvarUsuario(u);}}});await ref.set(data);}alert('❌ Rejeitado.');adminTab('saques');}
    async function admToggle(uid){const u=await CloudDB.buscarPorId(uid);if(u){u.bloqueado=!u.bloqueado;await CloudDB.salvarUsuario(u);alert(u.bloqueado?'🔒 Bloqueado!':'🔓 Desbloqueado!');adminTab('usuarios');}}
    async function admSalvarAfiliados(){linksAfiliados.placard=document.getElementById('cfgPlacard')?.value||'';linksAfiliados.olabet=document.getElementById('cfgOlaBet')?.value||'';linksAfiliados.placardTxt=document.getElementById('cfgPlacardTxt')?.value||'';linksAfiliados.placardSub=document.getElementById('cfgPlacardSub')?.value||'';linksAfiliados.olabetTxt=document.getElementById('cfgOlaBetTxt')?.value||'';linksAfiliados.olabetSub=document.getElementById('cfgOlaBetSub')?.value||'';await CloudDB.salvarConfig();alert('✅ Salvo!');}
    async function admSalvarConfig(){const ns=document.getElementById('cfgSenha')?.value;if(ns&&ns.length>=4){adminSenha=ns;alert('✅ Senha alterada!');}await CloudDB.salvarConfig();}

    async function init(){
        await CloudDB.carregarConfig();
        U=criarConvidado();P=PAISES['MZ'];
        setTimeout(function(){document.getElementById('splash').classList.add('hidden');document.getElementById('mainApp').classList.remove('hidden');document.getElementById('mainApp').classList.add('active');ui();navegar('home');},2500);
        setInterval(function(){fakeUserCount+=Math.floor(Math.random()*3);},30000);
        setInterval(function(){if(U){resetCheck();ui();}},30000);
    }
    document.addEventListener('DOMContentLoaded',init);
    console.log('🚀 CLIPCASH v24 - YouTube + Sem Login');
    </script>
</body>
</html>
