    <style>
        :root {
            --bg: #0a0a0f; --bg2: #12121a; --bg3: #1a1a25; --bg4: #1e1e2e;
            --gold: #ffd700; --green: #10b981; --red: #ef4444; --purple: #8b5cf6;
            --text: #e2e8f0; --text2: #94a3b8; --border: #1e293b; --card: #1a1a28; --radius: 16px;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Poppins',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; -webkit-tap-highlight-color:transparent; user-select:none; overflow-x:hidden; line-height:1.5; }

        .cloud-status { display:inline-flex; align-items:center; gap:4px; font-size:9px; padding:3px 8px; border-radius:10px; font-weight:600; }
        .cloud-status.online { background:rgba(16,185,129,0.2); color:#10b981; border:1px solid rgba(16,185,129,0.3); }
        .cloud-status.offline { background:rgba(239,68,68,0.2); color:#ef4444; border:1px solid rgba(239,68,68,0.3); }

        .splash { position:fixed; inset:0; background:radial-gradient(ellipse at center,#1a1a35,#0a0a0f); display:flex; align-items:center; justify-content:center; z-index:99999; flex-direction:column; transition:opacity 0.5s ease; }

        .splash-logo { font-size:80px; animation:floatSplash 3s ease-in-out infinite; filter:drop-shadow(0 0 40px rgba(255,215,0,0.6)); }

        .splash-title { font-size:44px; font-weight:900; background:linear-gradient(135deg,#ffd700,#ffaa00,#ffd700); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; margin-top:14px; }
        .splash-progress { width:180px; height:3px; background:rgba(255,255,255,0.1); border-radius:3px; margin-top:20px; overflow:hidden; }
        .splash-progress-fill { height:100%; background:var(--gold); border-radius:3px; animation:progressAnim 2.5s ease forwards; }
        @keyframes progressAnim { from{width:0%} to{width:100%} }

        .screen { display:none; position:fixed; inset:0; background:var(--bg); overflow-y:auto; overflow-x:hidden; }
        .screen.active { display:flex; flex-direction:column; }
        .app-header { background:var(--bg2); border-bottom:1px solid var(--border); padding:8px 12px; position:sticky; top:0; z-index:100; }

        .user-avatar { width:34px; height:34px; border-radius:50%; border:2px solid #ffd700; display:flex; align-items:center; justify-content:center; font-size:16px; background:var(--bg3); flex-shrink:0; cursor:pointer; position:relative; }

        .header-balance .bal-lbl { font-size:7px; color:var(--text2); }
        .main-content { flex:1; overflow-y:auto; padding:8px; padding-bottom:75px; }
        .page { display:none; } .page.active { display:block; animation:fadeIn 0.3s ease; }
        @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
        .card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:14px; margin-bottom:10px; }
        .card-gold { background:linear-gradient(135deg,#f59e0b,#d97706); color:#000; border:none; }
        .card-title { font-weight:700; font-size:14px; margin-bottom:8px; }
        .progress-bar { height:8px; background:rgba(255,255,255,0.1); border-radius:4px; overflow:hidden; }
        .progress-fill { height:100%; background:linear-gradient(90deg,#8b5cf6,#ffd700); border-radius:4px; transition:width 0.5s; }
        .bottom-nav { position:fixed; bottom:0; left:0; right:0; background:var(--bg2); border-top:1px solid var(--border); display:flex; justify-content:space-around; padding:8px 0 10px; z-index:100; }

        .btn-gold { background:linear-gradient(135deg,#ffd700,#ff8c00); color:#000; }
        .btn-sm { padding:6px 14px; background:#ffd700; border:none; border-radius:16px; color:#000; font-weight:700; font-size:10px; cursor:pointer; }
        .input-field { width:100%; padding:10px; background:var(--bg3); border:1px solid var(--border); border-radius:8px; color:#fff; font-size:12px; margin-bottom:8px; outline:none; font-family:'Poppins',sans-serif; }

        .timer-bar { width:100%; height:5px; background:rgba(255,255,255,0.15); border-radius:3px; overflow:hidden; margin:8px 0; }
        .timer-bar-fill { height:100%; background:#10b981; border-radius:3px; transition:width 1s linear; }
        .status-text { font-size:13px; font-weight:600; text-align:center; min-height:20px; }

        .wd-method { padding:10px 6px; background:var(--bg3); border:2px solid var(--border); border-radius:10px; text-align:center; cursor:pointer; font-size:9px; font-weight:600; }

        .affiliate-icon { font-size:28px; } .affiliate-title { font-weight:700; font-size:11px; } .affiliate-subtitle { font-size:9px; opacity:0.8; }

        .video-card-3d { background:linear-gradient(145deg,#1a1a30,#151525); border:2px solid var(--border); border-radius:16px; padding:14px; margin-bottom:10px; cursor:pointer; transition:all 0.4s; animation:floatCard 3s ease-in-out infinite; }
        .video-card-3d:nth-child(odd) { animation-delay:0s; } .video-card-3d:nth-child(even) { animation-delay:1.5s; }
        .video-card-3d:hover { transform:translateY(-8px) scale(1.03); border-color:var(--gold); box-shadow:0 20px 40px rgba(255,215,0,0.2); }
        @keyframes floatCard { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
        .video-card-3d .vc-inner { display:flex; gap:12px; align-items:center; }
        .video-card-3d .vc-icon { width:48px; height:48px; background:#000; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:24px; border:2px solid rgba(255,215,0,0.3); }
        .video-card-3d .vc-info { flex:1; } .video-card-3d .vc-title { font-weight:700; font-size:14px; }
        .video-card-3d .vc-anunciante { font-size:10px; color:var(--text2); }
        .video-card-3d .vc-reward { font-size:11px; color:var(--gold); font-weight:600; }

        .invite-box { background:linear-gradient(135deg,#1e3a5f,#2d1b4e); border:2px solid #ffd700; border-radius:14px; padding:14px; text-align:center; margin-bottom:10px; }
        .invite-link-display { background:#000; color:#0f0; font-family:monospace; font-size:12px; padding:10px; border-radius:8px; word-break:break-all; margin:8px 0; }
        .login-prompt { background:linear-gradient(135deg,#1a1a35,#2d1b4e); border:2px solid #ffd700; border-radius:14px; padding:12px; text-align:center; margin-bottom:10px; }
        
        .admin-tabs { display:flex; gap:5px; flex-wrap:wrap; margin-bottom:12px; }
        .admin-tab { padding:8px 14px; background:var(--bg3); border:1px solid var(--border); border-radius:16px; cursor:pointer; font-size:10px; font-weight:600; }
        .admin-tab.active { background:var(--gold); color:#000; }
        .admin-user-counter { background:linear-gradient(135deg,#1a1a35,#2d1b4e); border:2px solid var(--gold); border-radius:14px; padding:12px; text-align:center; margin-bottom:12px; }
        .admin-user-counter .count { font-size:32px; font-weight:900; color:var(--gold); }
        .video-admin-item { background:var(--bg4); padding:8px; border-radius:8px; margin-bottom:6px; border:1px solid var(--border); }
        .video-admin-item label { font-size:9px; color:var(--text2); display:block; margin-bottom:2px; }
        .video-admin-item input { width:100%; padding:6px; background:var(--bg3); border:1px solid var(--border); border-radius:4px; color:#fff; font-size:10px; margin-bottom:3px; font-family:'Poppins',sans-serif; }

        /* TIMER FLUTUANTE */
        .timer-float {
            position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
            background:rgba(0,0,0,0.95); border:2px solid #ffd700; border-radius:20px;

        }
        .timer-float.active { display:block; animation:slideUp 0.5s ease; }

        .timer-float .tf-info { font-size:9px; color:var(--text2); }
        .timer-float .tf-btn { padding:8px 16px; background:#10b981; border:none; border-radius:12px; color:#fff; font-weight:700; font-size:11px; cursor:pointer; margin-top:6px; }
        .timer-float .tf-btn:disabled { background:#334155; opacity:0.5; }
    </style>
</head>

    const DB={ref(p){return fbDB.ref(p);},async salvar(p,d){try{await this.ref(p).set(d);}catch(e){}},async buscar(p){try{return(await this.ref(p).once('value')).val();}catch(e){return null;}},async salvarUsuario(u){if(u.isGuest)return;await this.ref('usuarios/'+u.id).set(u);await this.ref('emails/'+u.email.toLowerCase().replace(/\./g,'_')).set({uid:u.id});},async buscarPorEmail(e){const d=await this.buscar('emails/'+e.toLowerCase().replace(/\./g,'_'));return(d&&d.uid)?await this.buscar('usuarios/'+d.uid):null;},async buscarPorId(id){return await this.buscar('usuarios/'+id);},async addSaque(uid,s){s.id='sq'+Date.now();s.dt=new Date().toISOString();s.st='pendente';await this.salvar('saques/'+uid+'/'+s.id,s);},async todosSaques(){const d=await this.buscar('saques');if(!d)return[];let t=[];Object.values(d).forEach(a=>{if(a)Object.values(a).forEach(x=>t.push(x));});return t;},async carregarConfig(){const c=await this.buscar('config');if(c){if(c.adminSenha)adminSenha=c.adminSenha;if(c.afiliados)linksAfiliados=c.afiliados;}},async salvarConfig(){await this.salvar('config',{adminSenha,afiliados:linksAfiliados});}};

    function fm(v){return P.simbolo+' '+(v||0).toFixed(2);}

    function mostrarLogin(){document.getElementById('loginPopup').classList.remove('hidden');showLoginForm();}

    async function executarLogin(){
        const em=document.getElementById('loginEmail2').value.trim(),sn=document.getElementById('loginSenha2').value;
        if(!em||!sn||sn.length<6)return err2('Preencha!');
        const u=await DB.buscarPorEmail(em);

        if(atob(u.senha)!==sn)return err2('Senha incorreta!');

    }

    async function executarCadastro(){
        const n=document.getElementById('regNome2').value.trim(),e=document.getElementById('regEmail2').value.trim(),s=document.getElementById('regSenha2').value,sc=document.getElementById('regSenhaC2').value,pc='MZ';
        if(!n||!e||!s)return err2('Preencha!');if(s.length<6)return err2('Senha: mínimo 6!');if(s!==sc)return err2('Senhas não conferem!');

        const p=PAISES[pc],id='u'+Date.now(),up=new URLSearchParams(window.location.search),cc=up.get('ref');
        const novo={id,nome:n,email:e,senha:btoa(s),pais:pc,data_cadastro:new Date().toISOString(),saldo:0,videos_hoje:0,data_reset:new Date(new Date().getTime()+p.utc*3600000).toISOString().split('T')[0],saque_minimo:p.saque_min,multiplicador:1,total_ganho:0,total_sacado:0,bloqueado:false,convidado_por:null,convidados:[],codigo_convite:'CC'+Date.now().toString(36).toUpperCase(),isGuest:false};
        if(cc){const cv=await DB.buscarPorId((await DB.buscar('convites/'+cc))?.uid);if(cv&&cv.id!==novo.id){novo.convidado_por=cv.id;const bn=Math.round(CFG.BONUS_CONVIDADO*p.cambio/64*100)/100;novo.saldo=bn;novo.total_ganho=bn;const bc=Math.round(CFG.BONUS_CONVIDANTE*p.cambio/64*100)/100;cv.saldo+=bc;cv.total_ganho+=bc;if(!cv.convidados)cv.convidados=[];cv.convidados.push({id:novo.id,nome:n,email:e,data:new Date().toISOString(),bonus:bc});await DB.salvarUsuario(cv);}}
        await DB.salvarUsuario(novo);await DB.salvar('convites/'+novo.codigo_convite,{uid:novo.id});
        entrar(novo);document.getElementById('loginPopup').classList.add('hidden');alert('✅ Conta criada!\n💰 Saldo: '+fm(novo.saldo));
    }

    function entrar(u){U=u;P=PAISES[u.pais]||PAISES['MZ'];resetCheck();ui();navegar('home');}

    function homeHTML(){if(!U)U=criarConvidado();resetCheck();const ps=Math.min(100,(U.saldo/U.saque_minimo)*100),vr=Math.max(0,CFG.VIDEOS_DIA-U.videos_hoje),isGuest=U.isGuest===true;let gm='';if(isGuest){gm=`<div class="login-prompt"><p>⚠️ <b>Modo Visitante</b></p><p style="font-size:10px;">Saldo NÃO salvo!</p><button class="btn btn-gold" onclick="mostrarLogin()" style="font-size:11px;">🔐 Criar Conta</button></div>`;}return`
        <div class="affiliate-row"><div class="affiliate-card placard" onclick="abrirAfiliado('placard')"><div class="affiliate-icon">🏆</div><div class="affiliate-title">${linksAfiliados.placardTxt}</div><div class="affiliate-subtitle">${linksAfiliados.placardSub}</div></div><div class="affiliate-card olabet" onclick="abrirAfiliado('olabet')"><div class="affiliate-icon">🎰</div><div class="affiliate-title">${linksAfiliados.olabetTxt}</div><div class="affiliate-subtitle">${linksAfiliados.olabetSub}</div></div></div>
        ${gm}
        <div class="card card-gold" style="text-align:center;"><div style="font-size:34px;font-weight:900;">${fm(U.saldo)}</div><p style="font-size:11px;">Saque: ${fm(U.saque_minimo)}</p><button class="btn-sm" onclick="navegar('videos')" style="margin-top:8px;">🎬 Assistir (${vr})</button></div>
        <div class="card"><div class="card-title">📺 Vídeos Hoje</div><div style="display:flex;gap:6px;">${Array.from({length:CFG.VIDEOS_DIA},(_,i)=>`<div style="width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;${i<U.videos_hoje?'background:#22c55e;':'background:#334155;'}">${i<U.videos_hoje?'✅':'📹'}</div>`).join('')}</div><p>Ganho: ${fm(P.ganho_vid)}/vídeo</p></div>
        <div class="card"><div class="card-title">🎯 Progresso</div><div style="display:flex;justify-content:space-between;margin-bottom:4px;"><span>${fm(U.saldo)}</span><span>${fm(U.saque_minimo)}</span></div><div class="progress-bar"><div class="progress-fill" style="width:${ps}%;"></div></div><p style="text-align:center;color:#ffd700;margin-top:4px;">${Math.round(ps)}%</p></div>
        <div class="payout-box"><div class="payout-box-title"><span class="live-dot"></span> 💰 Saques Recentes</div>${['João S.','Maria C.','Carlos O.','Ana P.'].map(n=>`<div class="payout-item"><span>${['🇲🇿','🇧🇷','🇦🇴','🇵🇹'][Math.floor(Math.random()*4)]} ${n}</span><span style="color:#ffd700;">💰 ${['12.500 MT','880 R$','147 €','128.000 Kz'][Math.floor(Math.random()*4)]}</span></div>`).join('')}</div>
        <div class="invite-box"><p>🔗 Convide e Ganhe +${P.simbolo} ${CFG.BONUS_CONVIDANTE.toFixed(2)}</p><button class="btn btn-gold" onclick="navegar('invite')" style="margin-top:8px;">📤 Convidar</button></div>`;
    }
    function abrirAfiliado(tipo){const link=tipo==='placard'?linksAfiliados.placard:linksAfiliados.olabet;if(link)window.open(link,'_blank');}

    function videosHTML(){if(!U)U=criarConvidado();resetCheck();const vr=Math.max(0,CFG.VIDEOS_DIA-U.videos_hoje);if(vr<=0)return`<div style="text-align:center;padding:40px;"><div style="font-size:60px;">🎬</div><h2>Limite Atingido!</h2><p>Volte amanhã após 00:00 (${P.nome})</p></div>`;const embaralhados=[...VIDEOS_YT].sort(()=>Math.random()-0.5);return`<h3>🎬 ${vr} vídeos • ${fm(P.ganho_vid)}/vídeo</h3><p style="font-size:10px;color:var(--text3);margin-bottom:10px;">▶️ Clique para assistir no YouTube • Timer roda aqui</p>${embaralhados.map(v=>`<div class="video-card-3d" onclick="assistirNoYT('${v.id}')"><div class="vc-inner"><div class="vc-icon">${v.ic}</div><div class="vc-info"><div class="vc-title">${v.t}</div><div class="vc-anunciante">${v.a}</div><div class="vc-reward">🏆 ${fm(P.ganho_vid)}</div></div><div class="vc-play-btn">▶</div></div></div>`).join('')}`;}

    // ============================================
    // SISTEMA: VAI PARA YOUTUBE + TIMER NO SITE
    // ============================================
    function assistirNoYT(vid){
        if(!U)U=criarConvidado();resetCheck();
        if(U.videos_hoje>=CFG.VIDEOS_DIA)return alert('⚠️ Limite diário de '+CFG.VIDEOS_DIA+' vídeos atingido!');
        
        const v=VIDEOS_YT.find(x=>x.id===vid);
        if(!v)return;
        
        tfVideo=v;
        tfSeg=CFG.DURACAO_VIDEO;
        tfAtivo=true;
        tfGanho=P.ganho_vid;
        
        // Mostrar timer flutuante
        document.getElementById('timerFloat').classList.add('active');
        document.getElementById('tfTime').textContent='05:00';
        document.getElementById('tfBtn').disabled=true;
        document.getElementById('tfBtn').textContent='⏳ Aguarde...';
        
        // Abrir YouTube em nova aba
        window.open('https://www.youtube.com/watch?v='+v.yt,'_blank');
        
        // Iniciar temporizador
        if(timerFloat)clearInterval(timerFloat);
        const tot=CFG.DURACAO_VIDEO;
        timerFloat=setInterval(function(){
            if(tfAtivo){
                tfSeg--;
                const m=Math.floor(tfSeg/60),s=tfSeg%60;
                document.getElementById('tfTime').textContent=m+':'+s.toString().padStart(2,'0');
                if(tfSeg<=0){
                    clearInterval(timerFloat);timerFloat=null;
                    document.getElementById('tfBtn').disabled=false;
                    document.getElementById('tfBtn').textContent='🎁 Coletar '+fm(tfGanho);
                    document.getElementById('tfTime').textContent='00:00';
                }
            }
        },1000);
    }

    function coletarRecompensa(){
        if(tfSeg>0)return alert('⚠️ Aguarde o tempo acabar!');
        if(!tfVideo)return;
        
        U.saldo+=tfGanho;
        U.total_ganho+=tfGanho;
        U.videos_hoje++;
        if(!U.isGuest)DB.salvarUsuario(U);
        ui();
        
        document.getElementById('timerFloat').classList.remove('active');
        document.getElementById('popupAmount').textContent='+'+fm(tfGanho);
        document.getElementById('popupMsg').textContent='Vídeo: '+tfVideo.t;
        document.getElementById('rewardPopup').classList.remove('hidden');
        
        tfAtivo=false;tfVideo=null;tfGanho=0;
        if(pg==='videos')navegar('videos');
    }

    function saqueHTML(){if(!U)U=criarConvidado();if(U.isGuest)return`<div class="card card-gold" style="text-align:center;"><div style="font-size:36px;font-weight:900;">${fm(U.saldo)}</div><p>Saque: ${fm(U.saque_minimo)}</p></div><div class="login-prompt"><p>🔐 <b>Crie uma conta para sacar!</b></p><button class="btn btn-gold" onclick="mostrarLogin()">📝 Criar Conta</button></div>`;const sa=U.saldo>=U.saque_minimo,vr=U.saldo*(1-CFG.TAXA_SAQUE/100);let h=`<div class="card card-gold" style="text-align:center;"><div style="font-size:36px;font-weight:900;">${fm(U.saldo)}</div><p>Saque: ${fm(U.saque_minimo)}</p></div><div class="card"><div class="card-title">💳 Métodos em ${P.nome} (${P.metodos_saque.length})</div><div class="withdraw-methods">${P.metodos_saque.map(m=>`<div class="wd-method" onclick="selMetodo('${m}',this)">${m}</div>`).join('')}</div><div id="saqueDetalhe"></div>`;if(sa){h+=`<button class="btn btn-gold" onclick="solicitarSaque()">💰 Sacar ${fm(U.saque_minimo)}</button>`;}else{h+=`<p style="text-align:center;color:var(--red);">🔒 Faltam ${fm(U.saque_minimo-U.saldo)}</p>`;}h+=`</div>`;return h;}
    function selMetodo(m,el){metodoSaque=m;document.querySelectorAll('.wd-method').forEach(x=>x.classList.remove('selected'));el.classList.add('selected');document.getElementById('saqueDetalhe').innerHTML=`<input type="text" class="input-field" id="saqueDados" placeholder="Dados da conta ${m}">`;}
    async function solicitarSaque(){if(U.isGuest)return alert('Crie uma conta!');if(!metodoSaque)return alert('Selecione!');const d=document.getElementById('saqueDados')?.value;if(!d)return alert('Preencha!');if(U.saldo<U.saque_minimo)return alert('Saldo insuficiente!');const taxa=(U.saldo*CFG.TAXA_SAQUE)/100,vr=U.saldo-taxa;await DB.addSaque(U.id,{uid:U.id,nome:U.nome,email:U.email,valor:U.saldo,taxa,vr,metodo:metodoSaque,dados:d,simbolo:P.simbolo});U.saldo=0;U.total_sacado+=vr;await DB.salvarUsuario(U);ui();alert('✅ Saque solicitado!');navegar('home');}

    function inviteHTML(){if(!U)U=criarConvidado();if(U.isGuest)return`<div class="login-prompt"><p>🔐 <b>Crie uma conta para convidar!</b></p><button class="btn btn-gold" onclick="mostrarLogin()">📝 Criar Conta</button></div>`;const link=window.location.origin+window.location.pathname+'?ref='+U.codigo_convite,cv=U.convidados||[],tg=cv.reduce((a,c)=>a+(c.bonus||0),0);return`<div class="invite-box"><h3>🔗 Convide e Ganhe!</h3><p>+${P.simbolo}${CFG.BONUS_CONVIDANTE.toFixed(2)} por amigo</p><div class="invite-link-display">${link}</div><button class="btn btn-gold" onclick="copiarLink('${link}')">📋 Copiar</button></div><div class="card"><div class="card-title">📊 Indicações (${cv.length})</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;"><div style="background:var(--bg3);padding:10px;border-radius:10px;text-align:center;"><div style="font-size:24px;font-weight:700;color:#ffd700;">${cv.length}</div></div><div style="background:var(--bg3);padding:10px;border-radius:10px;text-align:center;"><div style="font-size:24px;font-weight:700;color:#10b981;">${fm(tg)}</div></div></div></div>`;}
    function copiarLink(link){navigator.clipboard.writeText(link).then(()=>alert('✅ Copiado!')).catch(()=>{const ta=document.createElement('textarea');ta.value=link;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);alert('✅ Copiado!');});}

    document.getElementById('adminTrigger')?.addEventListener('click',function(){adminClicks++;if(adminClicks>=15){adminClicks=0;document.getElementById('adminPassPopup').classList.remove('hidden');}setTimeout(function(){adminClicks=0;},3000);});

        if(tab==='config'){c.innerHTML=`<div class="card"><h4 style="color:#ffd700;">⚙️ Config</h4><input type="password" class="input-field" id="cfgSenha" placeholder="Nova senha"><button class="btn btn-gold" onclick="admSalvarConfig()">💾 Salvar</button></div>`;}

    async function admAprSaque(sid,uid){const ref=DB.ref('saques/'+uid),snap=await ref.once('value'),data=snap.val();if(data){Object.keys(data).forEach(k=>{if(data[k].id===sid)data[k].st='concluido';});await ref.set(data);}alert('✅ Aprovado!');}
